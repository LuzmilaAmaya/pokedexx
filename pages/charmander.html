<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charmander</title>
    <link rel="stylesheet" href="../CSS/charmander.css" />
  </head>
  <body>
    <header>
      <a href="index.html">
        <img
          src="https://media-protected.taiga.io/attachments/2/0/0/2/0bb2901adf543c7b57f2e3619dd99798cfc51347253c740827c5aac2042a/pokemon.png?token=aFrTLQ%3AdSFJWxLGI8xhcX4NYlsyQ_-kiKLTFZSRbgcaLwzwcjk5YY5d6XsKvzHCYTLNMQg7K6JmRI_WSCGTtB0bbEp-gg#_taiga-refresh=userstory:4146109"
          alt="Pokémon Logo"
          class="logo"
        />
      </a>
    </header>

    <main class="container">
      <section class="charmander-box">
        <div class="title-box">
          <span>Charmander</span>
        </div>
        <img
          src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/004.png"
          alt="Charmander"
        />
        <p><strong>Peso:</strong> 85 lbs</p>
        <p><strong>Tipo:</strong> Fuego</p>
        <p class="descripcion">
          Charmander es un Pokémon tipo fuego. La llama de su cola indica su
          fuerza vital. Si está débil, la llama arderá más tenue.
        </p>
      </section>

      <section class="evoluciones-box">
        <h2>Evoluciones</h2>
        <div class="evoluciones">
          <div class="evolucion">
            <img
              src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/005.png"
              alt="charmeleon"
            />
            <p>Charmeleon</p>
          </div>
          <div class="evolucion">
            <img
              src="https://www.pokemon.com/static-assets/content-assets/cms2/img/pokedex/full/006.png"
              alt="charizard"
            />
            <p>Charizard</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
